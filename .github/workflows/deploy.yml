name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 1 * *" # 매월 1일 00:00 UTC — 저작권 연도 등 자동 갱신 위해 재빌드
  workflow_dispatch:

permissions:
  contents: write # 드래그앤드롭 이미지 위치 정리 커밋을 위해
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 드래그앤드롭 이미지 위치 정리 (Sveltia #830 우회)
        run: |
          node scripts/normalize-cms-images.mjs
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: 드래그앤드롭 이미지 위치 자동 정리"
            git push origin HEAD:main
          fi
      - run: pnpm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
