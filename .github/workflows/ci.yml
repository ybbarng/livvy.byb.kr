name: CI

# 코드 변경 시에만 lint·test·타입체크를 돈다.
# 글(포스트/페이지)만 바뀐 push는 건너뛴다 → 게시 속도에 영향 없음.
on:
  push:
    branches: [main]
    paths-ignore:
      - "src/content/**"
      - "public/uploads/**"
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm check
