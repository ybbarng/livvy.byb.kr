version: 2
updates:
  # npm/pnpm 의존성 — 주 1회, minor·patch 는 하나로 묶어 PR 소음 줄이기
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: chore
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions 버전 업데이트
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: chore
