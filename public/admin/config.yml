# Sveltia CMS 설정
# 문서: https://sveltiacms.app/en/docs/

backend:
  name: github
  repo: ybbarng/livvy.byb.kr
  branch: main
  # GitHub Pages(서버리스)에서 로그인하려면 OAuth 중개자가 필요하다.
  # Cloudflare Worker(sveltia-cms-auth) 주소.
  base_url: https://sveltia-cms-auth.ybbarng.workers.dev

# UI 언어
locale: ko

# 이미지 저장 위치(전역). 컬렉션별로 재정의하면 Sveltia가 루트에 저장하는 문제가 있어 전역만 쓴다.
# 이미지: Browse(이미지 버튼)로 첨부하면 글 폴더에 저장된다(collection media_folder: '').
# 드래그앤드롭/붙여넣기는 Sveltia 버그(#830)로 루트에 저장되지만, 빌드 시
# scripts/normalize-cms-images.mjs 가 글 폴더로 자동 이동해 우회한다.
# 전역 media_folder는 Sveltia에 반드시 정의돼 있어야 한다(컬렉션에서 '' 로 재정의).
media_folder: /public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: 글
    label_singular: 글
    description: 블로그 글
    folder: src/content/posts
    path: '{{fields.slug}}/index' # src/content/posts/{slug}/index.md
    media_folder: '' # Browse 첨부 시 글 폴더에 저장(entry-relative)
    public_folder: ''
    create: true
    slug: '{{fields.slug}}'
    identifier_field: title
    summary: '{{title}} ({{fields.slug}})'
    sortable_fields: [date, title]
    fields:
      - { name: title, label: 제목, widget: string }
      - {
          name: slug,
          label: 'slug (URL 주소)',
          widget: string,
          hint: 'URL이 되는 값입니다. 한글 가능, 공백 대신 하이픈(-)을 쓰세요. 예: 놀러-가고-싶다',
        }
      - {
          name: date,
          label: 게시일,
          widget: datetime,
          # 현지 시각 + offset 포함 저장(예: 2026-07-20T23:01+09:00). 기존 글 형식과 일치.
          format: 'YYYY-MM-DDTHH:mmZ',
          input_timezone: local, # 작성하는 곳의 시간대로 입력
          default: '{{now}}',
        }
      - {
          name: author,
          label: 저자,
          widget: select,
          options:
            [{ label: 현지, value: livvy }, { label: 용배, value: ybbarng }],
        }
      - {
          name: category,
          label: 카테고리,
          widget: select,
          options:
            [
              { label: 잡담, value: smalltalk },
              { label: 공부, value: study },
              { label: 같이 놀기, value: date },
            ],
        }
      - { name: tags, label: 태그, widget: list, required: false, default: [] }
      - {
          name: description,
          label: 요약,
          widget: text,
          required: false,
          hint: '목록과 미리보기(SNS 공유)에 쓰이는 짧은 소개입니다.',
        }
      - {
          name: draft,
          label: '초안 (체크를 해제하면 사이트에 발행됩니다)',
          widget: boolean,
          default: true, # 새 글은 기본적으로 초안 상태로 시작(실수 발행 방지)
        }
      - {
          name: body,
          label: 본문,
          widget: markdown,
          hint: '이미지는 툴바의 이미지 버튼을 눌러 Browse로 첨부하세요. (끌어다 놓기는 현재 이미지가 엉뚱한 곳에 저장되는 문제가 있습니다)',
        }

  - name: pages
    label: 페이지
    label_singular: 페이지
    description: about 같은 정적 페이지
    folder: src/content/pages
    path: '{{fields.slug}}/index'
    create: true
    slug: '{{fields.slug}}'
    identifier_field: title
    fields:
      - { name: title, label: 제목, widget: string }
      - { name: slug, label: 'slug (URL 주소)', widget: string }
      - {
          name: date,
          label: 게시일,
          widget: datetime,
          format: 'YYYY-MM-DDTHH:mmZ',
          input_timezone: local,
          required: false,
        }
      - { name: description, label: 요약, widget: text, required: false }
      - { name: body, label: 본문, widget: markdown }
