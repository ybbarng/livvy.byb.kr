<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>콘텐츠 관리 · 현지와 용배의 블로그</title>
    <style>
      /* 게시 상태 토스트 — Sveltia 상단 앱바(툴바) DOM 안에 삽입되는 아이템.
         데스크톱은 우측 버튼 그룹 앞, 모바일은 FAB 앞(여유 공간)에 자리한다.
         앱바의 일부라 위치/레이아웃이 항상 앱바를 따른다. */
      #deploy-toast {
        display: none;
        align-items: center;
        gap: 7px;
        height: 30px;
        padding: 0 13px 0 9px;
        margin: 0 6px;
        border-radius: 16px;
        color: #fff;
        font: 500 13px/1 -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.25s ease, background 0.3s ease;
        flex: none;
        align-self: center;
      }
      #deploy-toast.show {
        opacity: 1;
      }
      #deploy-toast .dt-icon-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: none;
        width: 17px;
        height: 17px;
      }
      #deploy-toast .dt-spin {
        width: 15px;
        height: 15px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: dt-spin 0.7s linear infinite;
        box-sizing: border-box;
      }
      @keyframes dt-spin {
        to {
          transform: rotate(360deg);
        }
      }
      #deploy-toast .dt-check {
        width: 17px;
        height: 17px;
        flex: none;
      }
      #deploy-toast .dt-check circle {
        opacity: 0.35;
      }
      #deploy-toast .dt-check path {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: dt-draw 0.45s 0.05s ease forwards;
      }
      @keyframes dt-draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      #deploy-toast.done .dt-icon-wrap {
        animation: dt-pop 0.35s ease;
      }
      @keyframes dt-pop {
        0% {
          transform: scale(0.9);
        }
        60% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <!-- Sveltia CMS (Decap 후신, Lexical 에디터로 CJK/IME 입력 안정) -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

    <script>
      (function () {
        const REPO = 'ybbarng/livvy.byb.kr';
        const RUNS = `https://api.github.com/repos/${REPO}/actions/runs?branch=main&per_page=1`;

        const SPIN = '<span class="dt-icon-wrap"><span class="dt-spin"></span></span>';
        const CHECK =
          '<span class="dt-icon-wrap"><svg class="dt-check" viewBox="0 0 24 24" fill="none">' +
          '<circle cx="12" cy="12" r="11" stroke="#fff" stroke-width="2"/>' +
          '<path d="M6.5 12.5l3.5 3.5 7.5-8" stroke="#fff" stroke-width="2.5" ' +
          'stroke-linecap="round" stroke-linejoin="round" pathLength="1"/></svg></span>';
        const CROSS =
          '<span class="dt-icon-wrap"><svg class="dt-check" viewBox="0 0 24 24" fill="none">' +
          '<circle cx="12" cy="12" r="11" stroke="#fff" stroke-width="2"/>' +
          '<path d="M8 8l8 8M16 8l-8 8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg></span>';

        const toast = document.createElement('div');
        toast.id = 'deploy-toast';

        // 앱바(툴바)의 '+'(데스크톱) 또는 FAB(모바일) 버튼 바로 왼쪽에 삽입/유지한다.
        function mount() {
          const inner = document.querySelector('.sui.toolbar.horizontal.primary .inner');
          if (!inner) return false;
          // 데스크톱: '+' 버튼 바로 앞(우측 버튼 그룹 안). 그룹이 오른쪽 끝으로 밀려 있어
          //          그룹 자체 앞에 넣으면 왼쪽으로 떨어져 보이므로, 반드시 그룹 안으로 들어간다.
          // 모바일: FAB(Create New Entry) 바로 앞(spacer 다음).
          const target =
            inner.querySelector('[aria-label="Create Entry or Assets"]') ||
            inner.querySelector('.floating-action-button-wrapper');
          if (target) {
            const parent = target.parentElement;
            // 이미 올바른 자리면 다시 넣지 않는다(MutationObserver 되먹임 방지).
            if (toast.parentElement === parent && toast.nextElementSibling === target) return true;
            parent.insertBefore(toast, target);
            return true;
          }
          // 버튼을 못 찾으면 우측 버튼 그룹 앞(차선책)
          const groups = inner.querySelectorAll(':scope > .buttons');
          const g = groups[groups.length - 1];
          if (g) {
            if (!(toast.parentElement === inner && toast.nextElementSibling === g)) inner.insertBefore(toast, g);
          } else if (toast.parentElement !== inner) {
            inner.appendChild(toast);
          }
          return true;
        }
        // Sveltia가 화면을 다시 그려도 토스트가 보이는 동안 계속 앱바에 재삽입
        const mo = new MutationObserver(() => {
          if (toast.style.display !== 'none') mount();
        });
        mo.observe(document.body, { childList: true, subtree: true });

        let hideTimer = null;
        function render(icon, text, bg, opts = {}) {
          clearTimeout(hideTimer);
          toast.innerHTML = icon + '<span>' + text + '</span>';
          toast.style.background = bg;
          toast.classList.toggle('done', !!opts.pop);
          toast.style.display = 'flex';
          mount();
          requestAnimationFrame(() => toast.classList.add('show'));
          if (opts.autoHide) hideTimer = setTimeout(hide, opts.autoHide);
        }
        function hide() {
          toast.classList.remove('show');
          setTimeout(() => {
            toast.style.display = 'none';
          }, 260);
        }

        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
        async function latestRun() {
          try {
            const r = await fetch(RUNS, { headers: { Accept: 'application/vnd.github+json' } });
            if (!r.ok) return null;
            const d = await r.json();
            return (d.workflow_runs && d.workflow_runs[0]) || null;
          } catch {
            return null;
          }
        }

        function finish(conclusion) {
          if (conclusion === 'success') {
            render(CHECK, '게시 완료! 곧 반영돼요', '#059669', { pop: true, autoHide: 9000 });
          } else {
            render(CROSS, '게시 실패 — 확인이 필요해요', '#dc2626', { autoHide: 12000 });
          }
        }

        // expectNew=true: 방금 저장 → 새 워크플로 run 을 기다린다.
        // expectNew=false: 진입 시 체크 → 이미 진행 중인 run 이 있으면 추적한다.
        let polling = false;
        async function watch(expectNew) {
          if (polling) return;
          polling = true;
          const base = await latestRun();
          const baseId = base ? base.id : null;
          if (expectNew) {
            render(SPIN, '저장됨 — 게시 준비 중…', '#475569');
          } else if (!base || base.status === 'completed') {
            polling = false;
            return;
          } else {
            render(SPIN, '게시 중… 빌드하고 있어요', '#475569');
          }
          let targetId = expectNew ? null : baseId;
          const started = Date.now();
          while (Date.now() - started < 6 * 60 * 1000) {
            await sleep(12000);
            const run = await latestRun();
            if (!run) continue;
            if (targetId === null) {
              if (run.id !== baseId) {
                targetId = run.id;
                render(SPIN, '게시 중… 빌드하고 있어요', '#475569');
              }
              continue;
            }
            if (run.id === targetId) {
              if (run.status === 'completed') {
                finish(run.conclusion);
                polling = false;
                return;
              }
            } else if (run.status !== 'completed') {
              targetId = run.id;
            }
          }
          hide();
          polling = false;
        }

        // 진입 시 이미 빌드 중인지 확인
        setTimeout(() => watch(false), 3500);

        // 저장(Save) 클릭 감지 → 새 배포 추적
        document.addEventListener(
          'click',
          (e) => {
            const btn = e.target && e.target.closest && e.target.closest('button');
            if (!btn) return;
            const label = (btn.textContent || '') + ' ' + (btn.getAttribute('aria-label') || '');
            if (/\bsave\b|저장|publish|발행/i.test(label)) {
              setTimeout(() => watch(true), 4000);
            }
          },
          true,
        );
      })();
    </script>
  </body>
</html>
